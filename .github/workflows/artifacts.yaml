name: Artifacts Example

on: push

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Create file
        run: echo "Hello GitHub Actions" > file.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-file
          path: file.txt


  download:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: demo-file

      - name: Print file
        run: cat file.txt