name: Environment Variables Example

on: push

env:
  APP_NAME: github-actions-demo

jobs:
  env-job:
    runs-on: ubuntu-latest

    steps:
      - name: Print workflow env
        run: echo "App name is $APP_NAME"

      - name: Job level env
        env:
          NODE_VERSION: 20
        run: echo "Node version is $NODE_VERSION"