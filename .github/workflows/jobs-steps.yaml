# Job → A group of tasks running on a runner (VM).
# Step → Individual commands inside a job.name: Jobs vs Steps

on: push

jobs:
  demo-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Build project
        run: npm run build