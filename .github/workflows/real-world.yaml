name: Real-world example

on: push

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: lint command
        run: npm run lint

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: build command
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: docker build command
        run: docker build -t app .

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: deploy process
        run: echo "Deploying to Cloud Run"